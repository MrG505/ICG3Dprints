<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICG3Dprints - Custom Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ford-blue: #003478; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200">
    <!-- Same NAV as above - copy from about.html or index.html -->

    <div class="max-w-2xl mx-auto px-6 py-20">
        <h1 class="text-5xl font-bold text-center mb-4 text-[#003478]">Custom Design Requests</h1>
        <p class="text-center text-xl text-gray-400 mb-12">Submit your idea — we’ll bring it to life</p>

        <div class="bg-[#1a1a1a] border border-[#003478]/50 rounded-3xl p-10">
            <form action="https://formspree.io/f/mqakdkyq" method="POST" class="space-y-8"> <!-- Free Formspree - works instantly -->
                <div>
                    <input type="text" name="name" placeholder="Your Name" required class="w-full bg-black border border-[#003478] focus:border-white p-5 rounded-2xl text-lg">
                </div>
                <div>
                    <input type="email" name="email" placeholder="Your Email" required class="w-full bg-black border border-[#003478] focus:border-white p-5 rounded-2xl text-lg">
                </div>
                <div>
                    <textarea name="message" rows="8" placeholder="Describe your custom design (size, style, reference images, mustang theme, fantasy, etc.)" required class="w-full bg-black border border-[#003478] focus:border-white p-5 rounded-2xl text-lg"></textarea>
                </div>
                <button type="submit" class="w-full bg-[#003478] hover:bg-blue-800 py-6 text-xl font-bold rounded-2xl transition transform hover:scale-[1.02]">
                    Send Custom Request
                </button>
            </form>

            <div class="text-center mt-10">
                <p class="text-gray-400">Or email directly:</p>
                <a href="mailto:icg3dprints@yahoo.com" class="text-[#003478] text-2xl font-semibold hover:underline">icg3dprints@yahoo.com</a>
            </div>
        </div>
    </div>
</body>
</html>
