<form action="https://formspree.io/f/yourcode" method="POST" class="space-y-6"> <!-- or just use mailto for now -->
    <input type="text" name="name" placeholder="Name" class="w-full bg-zinc-900 border border-[#003478] p-4 rounded-xl" required>
    <input type="email" name="email" placeholder="Email" class="w-full bg-zinc-900 border border-[#003478] p-4 rounded-xl" required>
    <textarea name="design" rows="6" placeholder="Describe your custom design (size, style, reference images, etc.)" class="w-full bg-zinc-900 border border-[#003478] p-4 rounded-xl" required></textarea>
    <button type="submit" class="w-full bg-[#003478] py-5 text-xl font-bold rounded-xl hover:bg-blue-800">Submit Design Request</button>
</form>
<p class="text-center mt-6">Or email directly: <a href="mailto:icg3dprints@yahoo.com" class="text-[#003478]">icg3dprints@yahoo.com</a></p>
