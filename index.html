<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICG3Dprints - Premium 3D Prints</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        :root {
            --shadow-black: #0a0a0a;
            --ford-blue: #003478;
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background: var(--shadow-black); 
            color: #eee; 
        }
        header { 
            background: linear-gradient(to bottom, #1a1a1a, var(--shadow-black)); 
            padding: 4rem 2rem; 
            text-align: center; 
        }
        .logo { max-width: 320px; height: auto; margin-bottom: 1rem; filter: drop-shadow(0 0 12px var(--ford-blue)); }
        .hero { font-size: 3rem; margin: 0 0 0.5rem; color: var(--ford-blue); }
        .tagline { font-size: 1.35rem; color: #ccc; }
        .about { max-width: 900px; margin: 3rem auto; padding: 2rem; background: #1a1a1a; border-radius: 16px; border: 1px solid var(--ford-blue); }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 2rem; 
            padding: 3rem 2rem; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        .product { 
            background: #1a1a1a; 
            border: 1px solid var(--ford-blue); 
            border-radius: 16px; 
            overflow: hidden; 
            transition: all 0.3s; 
        }
        .product:hover { transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,52,120,0.4); }
        .product img { width: 100%; height: 320px; object-fit: cover; background: #111; }
        .info { padding: 1.5rem; text-align: center; }
        .price { font-size: 1.5rem; color: var(--ford-blue); font-weight: bold; }
        .buy-btn { 
            background: var(--ford-blue); 
            color: white; 
            padding: 1rem 2rem; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            width: 100%; 
            margin-top: 0.5rem; 
        }
        footer { text-align: center; padding: 3rem; background: var(--shadow-black); border-top: 2px solid var(--ford-blue); }
    </style>
</head>
<body>
    <header>
        <img src="logo3dprints.PNG" alt="ICG3Dprints Logo" class="logo">
        <h1 class="hero">ICG3Dprints</h1>
        <p class="tagline">Premium 3D Prints & Digital Designs • Powered by Bambu Lab P1P</p>
    </header>

    <section class="about">
        <h2>About Us</h2>
        <p>ICG3Dprints delivers premium, high-detail 3D printed creations using a Bambu Lab P1P...</p>
    </section>

    <section class="gallery">
        <!-- Your products here (same as before) -->
        <!-- Lion Head Plant Vase, Mustangs, Dragon Skull Cat Bed (Digital), etc. -->
        <!-- Keep the product blocks from my previous message or add them back -->
    </section>

    <footer>
        <p>© ICG3Dprints • Printed on Bambu Lab P1P • Custom orders welcome</p>
    </footer>
</body>
</html>
