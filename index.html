<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICG3Dprints - Premium 3D Prints & Digital Designs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        :root { --ford-blue: #003478; }
        .tail-container { font-family: system-ui, sans-serif; }
        .hero-bg { background: linear-gradient(rgba(10,10,10,0.85), rgba(10,10,10,0.95)); }
    </style>
</head>
<body class="tail-container bg-[#0a0a0a] text-gray-200">
    <!-- NAV -->
    <nav class="bg-black border-b border-[#003478] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <img src="logo3dprints.PNG" alt="ICG3Dprints" class="h-11 w-auto">
                <span class="text-3xl font-bold tracking-tight text-[#003478]">ICG3Dprints</span>
            </a>
            <div class="hidden md:flex items-center gap-10 text-lg font-medium">
                <a href="index.html" class="hover:text-[#003478] transition-colors">Home</a>
                <a href="shop.html" class="hover:text-[#003478] transition-colors">Shop</a>
                <a href="about.html" class="hover:text-[#003478] transition-colors">About</a>
                <a href="contact.html" class="hover:text-[#003478] transition-colors">Custom Orders</a>
            </div>
            <a href="contact.html" class="bg-[#003478] hover:bg-blue-800 px-6 py-3 rounded-xl font-semibold transition">Get Custom Quote</a>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero-bg min-h-screen flex items-center justify-center text-center px-6 relative overflow-hidden">
        <div class="max-w-4xl mx-auto">
            <img src="logo3dprints.PNG" alt="Logo" class="mx-auto h-40 mb-8 opacity-90">
            <h1 class="text-6xl md:text-7xl font-bold mb-6 text-white tracking-tighter">PREMIUM 3D PRINTS &amp; DIGITAL FILES</h1>
            <p class="text-2xl text-gray-300 mb-10">Bambu Lab P1P Powered • Mustang • Star Wars • Fantasy • Custom Creations</p>
            <a href="shop.html" class="inline-block bg-[#003478] hover:bg-blue-800 text-white text-2xl font-semibold px-12 py-6 rounded-2xl transition transform hover:scale-105">Browse Shop Now</a>
        </div>
    </header>
</body>
</html>
