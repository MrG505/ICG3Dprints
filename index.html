<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICG3Dprints - Premium 3D Prints & Designs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        :root { --ford-blue: #003478; }
        body { font-family: system-ui, sans-serif; }
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('logo3dprints.PNG') center/cover; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200">
    <!-- Nav -->
    <nav class="bg-black border-b border-[#003478] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <img src="logo3dprints.PNG" alt="Logo" class="h-10 w-auto">
                <span class="text-2xl font-bold text-[#003478]">ICG3Dprints</span>
            </a>
            <div class="hidden md:flex gap-8 text-lg">
                <a href="index.html" class="hover:text-[#003478] transition">Home</a>
                <a href="shop.html" class="hover:text-[#003478] transition">Shop</a>
                <a href="about.html" class="hover:text-[#003478] transition">About</a>
                <a href="contact.html" class="hover:text-[#003478] transition">Custom Orders</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="hero-bg h-screen flex items-center justify-center text-center">
        <div>
            <h1 class="text-6xl md:text-7xl font-bold text-white mb-4">Premium 3D Prints &amp; Digital Files</h1>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto">Bambu Lab P1P powered • High detail • Mustang, Star Wars, Fantasy &amp; Custom</p>
            <a href="shop.html" class="mt-8 inline-block bg-[#003478] hover:bg-blue-800 px-10 py-4 rounded-xl text-xl font-semibold transition">Browse Shop</a>
        </div>
    </header>
</body>
</html>
